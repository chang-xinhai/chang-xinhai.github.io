<script>
  (function () {
    const statsBaseUrl = {% if site.google_scholar_stats_use_cdn %}'https://cdn.jsdelivr.net/gh/{{ site.repository }}@'{% else %}'https://raw.githubusercontent.com/{{ site.repository }}/'{% endif %};
    const statsUrl = statsBaseUrl + 'google-scholar-stats/gs_data.json';
    const maxStatsAgeDays = 30;

    function setText(selector, value) {
      document.querySelectorAll(selector).forEach((node) => {
        node.textContent = value;
      });
    }

    function parseScholarDate(value) {
      if (!value) return null;
      const date = new Date(String(value).replace(' ', 'T'));
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function formatDate(value) {
      const date = parseScholarDate(value);
      if (!date) return 'when available';
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function isFresh(value) {
      const date = parseScholarDate(value);
      if (!date) return false;
      const ageMs = Date.now() - date.getTime();
      return ageMs >= 0 && ageMs <= maxStatsAgeDays * 24 * 60 * 60 * 1000;
    }

    function markStatsStale(message) {
      document.querySelectorAll('[data-scholar-stats]').forEach((node) => node.classList.add('is-stale'));
      setText('[data-scholar-citations]', '--');
      setText('[data-scholar-hindex]', '--');
      setText('[data-scholar-updated]', message || 'auto-sync pending');
    }

    function citationSeries(publication, count) {
      const perYear = publication && publication.cites_per_year;
      if (perYear && typeof perYear === 'object' && Object.keys(perYear).length) {
        return Object.keys(perYear).sort().map((year) => Number(perYear[year]) || 0);
      }
      return count > 0 ? [0, count] : [0, 0];
    }

    function drawSparkline(svg, values) {
      if (!svg || !values || !values.length) return;
      const width = 140;
      const height = 24;
      const pad = 3;
      const max = Math.max.apply(null, values.concat([1]));
      const step = values.length > 1 ? (width - pad * 2) / (values.length - 1) : 0;
      const points = values.map((value, index) => {
        const x = values.length > 1 ? pad + step * index : width / 2;
        const y = height - pad - ((Number(value) || 0) / max) * (height - pad * 2);
        return [x, y];
      });
      const d = points.map((point, index) => `${index ? 'L' : 'M'}${point[0].toFixed(2)} ${point[1].toFixed(2)}`).join(' ');
      const last = points[points.length - 1];
      svg.innerHTML = `<path d="${d}"></path><circle cx="${last[0].toFixed(2)}" cy="${last[1].toFixed(2)}" r="2.8"></circle>`;
    }

    function updatePublicationCitations(publications) {
      document.querySelectorAll('[data-scholar-id]').forEach((item) => {
        const scholarId = item.getAttribute('data-scholar-id');
        const publication = publications && publications[scholarId];
        if (!publication || publication.num_citations === undefined || publication.num_citations === null) return;

        const count = Number(publication.num_citations) || 0;
        const row = item.querySelector('.publication-citation-history');
        const svg = item.querySelector('.citation-sparkline');
        const countNode = item.querySelector('.citation-count');
        if (!row || !svg || !countNode) return;

        drawSparkline(svg, citationSeries(publication, count));
        countNode.textContent = `${count.toLocaleString()} citation${count === 1 ? '' : 's'}`;
        row.hidden = false;
      });
    }

    async function loadScholarStats() {
      try {
        const response = await fetch(statsUrl, { cache: 'no-store' });
        if (!response.ok) throw new Error('Unable to fetch Google Scholar stats');
        const data = await response.json();
        if (!isFresh(data.updated)) {
          markStatsStale(`stale since ${formatDate(data.updated)}`);
          return;
        }
        document.querySelectorAll('[data-scholar-stats]').forEach((node) => node.classList.remove('is-stale'));
        setText('[data-scholar-citations]', Number(data.citedby || 0).toLocaleString());
        setText('[data-scholar-hindex]', Number(data.hindex || 0).toLocaleString());
        setText('[data-scholar-updated]', formatDate(data.updated));
        // TODO: re-enable per-publication citations when FILL_PUBLICATION_DETAILS is back
        // updatePublicationCitations(data.publications || {});
      } catch (error) {
        markStatsStale('unavailable');
        console.warn('Google Scholar stats unavailable:', error);
      }
    }

    function setActive(buttons, activeButton) {
      buttons.forEach((button) => {
        const isActive = button === activeButton;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-pressed', String(isActive));
      });
    }

    function initPublicationFilters() {
      document.querySelectorAll('[data-filterable="true"]').forEach((list) => {
        const controls = list.previousElementSibling;
        if (!controls || !controls.classList.contains('publication-controls')) return;

        const scopeButtons = Array.from(controls.querySelectorAll('[data-scope-filter]'));
        const topicButtons = Array.from(controls.querySelectorAll('[data-topic-filter]'));
        const items = Array.from(list.querySelectorAll('.publication-item'));
        const empty = list.querySelector('.publication-empty');
        let scope = 'selected';
        let topic = 'all';

        function applyFilters() {
          let visibleCount = 0;
          items.forEach((item) => {
            const scopeMatch = scope === 'all' || item.getAttribute('data-selected') === 'true';
            const topicMatch = topic === 'all' || item.getAttribute('data-topic') === topic;
            const visible = scopeMatch && topicMatch;
            item.hidden = !visible;
            if (visible) visibleCount += 1;
          });
          if (empty) empty.hidden = visibleCount !== 0;
        }

        scopeButtons.forEach((button) => {
          button.addEventListener('click', () => {
            scope = button.getAttribute('data-scope-filter') || 'selected';
            setActive(scopeButtons, button);
            applyFilters();
          });
        });

        topicButtons.forEach((button) => {
          button.addEventListener('click', () => {
            topic = button.getAttribute('data-topic-filter') || 'all';
            setActive(topicButtons, button);
            applyFilters();
          });
        });

        applyFilters();
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      initPublicationFilters();
      loadScholarStats();
    });
  })();
</script>
