name: Get Citation Data

on:
  workflow_dispatch:
  schedule:
    # Refresh Scholar data every day at 08:00 UTC. GitHub Pages serves the generated JSON from the google-scholar-stats branch.
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r google_scholar_crawler/requirements.txt
      - name: Crawl Google Scholar
        run: |
          cd google_scholar_crawler
          python main.py
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
          FILL_PUBLICATION_DETAILS: "true"
      - name: Publish citation data
        run: |
          cd google_scholar_crawler/results
          git init
          git config --local user.name "${GITHUB_ACTOR}"
          git config --local user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add *.json
          git commit -m "Updated Citation Data" || exit 0
          git push "https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" HEAD:google-scholar-stats --force
